<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e08"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A0744A"/>
      <stop offset="100%" style="stop-color:#6F4E37"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Coffee cup body -->
  <rect x="50" y="70" width="72" height="65" rx="8" fill="url(#coffee)" opacity="0.9"/>
  <!-- Cup handle -->
  <path d="M122 85 C140 85, 145 110, 122 115" fill="none" stroke="#A0744A" stroke-width="6" stroke-linecap="round"/>
  <!-- Coffee surface -->
  <ellipse cx="86" cy="75" rx="34" ry="6" fill="#8B6544"/>
  <!-- Steam lines -->
  <path d="M70 58 Q73 48, 70 38" fill="none" stroke="#A0744A" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M86 55 Q89 43, 86 33" fill="none" stroke="#A0744A" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M102 58 Q105 48, 102 38" fill="none" stroke="#A0744A" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- MBTI text -->
  <text x="96" y="160" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#A0744A" opacity="0.8">MBTI</text>
</svg>
