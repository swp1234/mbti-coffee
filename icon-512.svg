<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e08"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A0744A"/>
      <stop offset="100%" style="stop-color:#6F4E37"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Coffee cup body -->
  <rect x="130" y="185" width="192" height="175" rx="20" fill="url(#coffee)" opacity="0.9"/>
  <!-- Cup handle -->
  <path d="M322 220 C370 220, 380 300, 322 305" fill="none" stroke="#A0744A" stroke-width="16" stroke-linecap="round"/>
  <!-- Coffee surface -->
  <ellipse cx="226" cy="195" rx="92" ry="16" fill="#8B6544"/>
  <!-- Steam lines -->
  <path d="M185 155 Q192 125, 185 95" fill="none" stroke="#A0744A" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M226 145 Q233 110, 226 80" fill="none" stroke="#A0744A" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M267 155 Q274 125, 267 95" fill="none" stroke="#A0744A" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- MBTI text -->
  <text x="256" y="425" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#A0744A" opacity="0.8">MBTI</text>
</svg>
